<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Albion OS 3.1</title>

<style>
:root{--accent:#2563eb;}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
overflow:hidden;
background:#0b1220;
color:white;
}

/* BOOT */
#boot{
position:fixed;
inset:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
z-index:999;
}

/* LOGIN */
#login{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.login-box{
background:rgba(0,0,0,.5);
padding:30px;
border-radius:12px;
text-align:center;
}

input,textarea{
padding:8px;
margin:6px;
border:none;
border-radius:6px;
}

/* DESKTOP */
#desktop{
display:none;
width:100vw;
height:100vh;
background:url('https://picsum.photos/1920/1080');
background-size:cover;
position:relative;
}

/* ICONS */
.icon{
width:90px;
text-align:center;
cursor:pointer;
margin:10px;
display:inline-block;
color:white;
}

/* TASKBAR */
#taskbar{
position:absolute;
bottom:0;
width:100%;
height:45px;
background:#111827;
display:flex;
align-items:center;
}

#startBtn{
width:80px;
height:100%;
background:var(--accent);
color:white;
border:none;
cursor:pointer;
}

#clock{
margin-left:auto;
padding-right:10px;
}

/* START MENU */
#startMenu{
display:none;
position:absolute;
bottom:45px;
left:0;
width:200px;
background:#1f2937;
padding:10px;
}

.menu-item{
padding:8px;
cursor:pointer;
}

.menu-item:hover{
background:#374151;
}

/* WINDOWS */
.window{
display:none;
position:absolute;
top:70px;
left:100px;
width:420px;
background:white;
color:black;
padding:10px;
border-radius:10px;
z-index:10;
}

button{
padding:6px;
margin:3px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
border-radius:6px;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">Albion OS 3.1</div>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>Albion OS Login</h2>
<input id="user" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>
</div>

<!-- DESKTOP -->
<div id="desktop">

<!-- ICONS -->
<div class="icon" onclick="openW('explorer')">📁<br>Explorer</div>
<div class="icon" onclick="openW('notes')">📝<br>Notes</div>
<div class="icon" onclick="openW('calc')">🧮<br>Calc</div>
<div class="icon" onclick="openW('browser')">🌐<br>Browser</div>

<!-- EXPLORER -->
<div id="explorer" class="window">
<h3>File Explorer</h3>
<ul id="files"></ul>
<button onclick="addFile()">New File</button>
<button onclick="closeW('explorer')">Close</button>
</div>

<!-- NOTES -->
<div id="notes" class="window">
<h3>Notes</h3>
<textarea id="notesArea" style="width:100%;height:120px"></textarea><br>
<button onclick="saveNotes()">Save</button>
<button onclick="closeW('notes')">Close</button>
</div>

<!-- CALC -->
<div id="calc" class="window">
<h3>Calculator</h3>
<input id="calcInput" style="width:100%"><br>
<button onclick="calc()">=</button>
<button onclick="closeW('calc')">Close</button>
</div>

<!-- BROWSER -->
<div id="browser" class="window">
<h3>Browser</h3>
<input id="url" placeholder="https://...">
<button onclick="go()">Go</button><br><br>
<iframe id="frame" width="100%" height="200"></iframe><br>
<button onclick="closeW('browser')">Close</button>
</div>

<!-- START MENU -->
<div id="startMenu">
<div class="menu-item" onclick="openW('explorer')">Explorer</div>
<div class="menu-item" onclick="openW('notes')">Notes</div>
<div class="menu-item" onclick="openW('calc')">Calculator</div>
<div class="menu-item" onclick="openW('browser')">Browser</div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
<button id="startBtn" onclick="toggleMenu()">Start</button>
<div id="clock"></div>
</div>

</div>

<script>

/* BOOT */
setTimeout(()=>{
document.getElementById("boot").style.display="none";
document.getElementById("login").style.display="flex";
},2000);

/* LOGIN */
function login(){
document.getElementById("login").style.display="none";
document.getElementById("desktop").style.display="block";
}

/* WINDOWS */
function openW(id){
document.getElementById(id).style.display="block";
}

function closeW(id){
document.getElementById(id).style.display="none";
}

/* START MENU */
function toggleMenu(){
let m=document.getElementById("startMenu");
m.style.display = m.style.display==="block"?"none":"block";
}

/* FILES */
function addFile(){
let li=document.createElement("li");
li.textContent="file_"+Math.floor(Math.random()*999)+".txt";
document.getElementById("files").appendChild(li);
}

/* NOTES */
function saveNotes(){
localStorage.setItem("notes",document.getElementById("notesArea").value);
alert("Saved!");
}

window.onload=()=>{
document.getElementById("notesArea").value=
localStorage.getItem("notes") || "";
}

/* CALC */
function calc(){
try{
document.getElementById("calcInput").value =
eval(document.getElementById("calcInput").value);
}catch{
alert("Error");
}
}

/* BROWSER */
function go(){
let url=document.getElementById("url").value;
if(!url.startsWith("http")) url="https://"+url;
document.getElementById("frame").src=url;
}

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerText=
new Date().toLocaleTimeString();
},1000);

</script>

</body>
</html>
