<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Albion OS ULTRA MAX 2.1</title>

<style>
body{margin:0;font-family:sans-serif;overflow:hidden;}

#boot{
position:fixed;width:100%;height:100%;
background:black;color:#00ffcc;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
z-index:999;
}

#desktop{
display:none;height:100vh;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

/* ICONS */
.icon{width:80px;text-align:center;margin:10px;display:inline-block;cursor:pointer;}
.icon div{
width:60px;height:60px;border-radius:15px;margin:auto;
display:flex;align-items:center;justify-content:center;
font-size:28px;
}

.note{background:linear-gradient(45deg,#38bdf8,#0284c7);}
.calc{background:linear-gradient(45deg,#facc15,#eab308);}
.game{background:linear-gradient(45deg,#f43f5e,#be123c);}
.paint{background:linear-gradient(45deg,#a78bfa,#7c3aed);}
.set{background:linear-gradient(45deg,#10b981,#047857);}

/* WINDOWS */
.window{
position:absolute;background:#1e293b;
border-radius:10px;padding:10px;
display:none;top:100px;left:100px;width:260px;
}

/* TASKBAR */
.taskbar{
position:fixed;bottom:0;width:100%;
background:#111;display:flex;
justify-content:space-between;padding:8px;
}

/* GAME */
.cell{
width:60px;height:60px;background:#334155;
display:inline-flex;align-items:center;
justify-content:center;margin:2px;
font-size:24px;
}

/* PAINT */
#canvas{
background:white;
touch-action:none;
}
</style>
</head>

<body>

<div id="boot">
<h1>ALBION OS</h1>
<p>Loading ULTRA MAX 2.1...</p>
</div>

<div id="desktop">

<!-- ICONS -->
<div class="icon" onclick="openWin('note')"><div class="note">📝</div>Note</div>
<div class="icon" onclick="openWin('calc')"><div class="calc">🧮</div>Calc</div>
<div class="icon" onclick="openWin('game')"><div class="game">❌</div>Game</div>
<div class="icon" onclick="openWin('paintApp')"><div class="paint">🎨</div>Paint</div>
<div class="icon" onclick="openWin('settings')"><div class="set">⚙️</div>Settings</div>

<!-- NOTEPAD -->
<div id="note" class="window">
<button onclick="closeWin('note')">X</button><br>
<textarea id="noteText" style="width:100%;height:120px;"></textarea>
<button onclick="saveNote()">Save</button>
</div>

<!-- CALC -->
<div id="calc" class="window">
<button onclick="closeWin('calc')">X</button><br>
<input id="display" style="width:100%"><br>
<button onclick="add('7')">7</button><button onclick="add('8')">8</button><button onclick="add('9')">9</button><button onclick="add('+')">+</button><br>
<button onclick="add('4')">4</button><button onclick="add('5')">5</button><button onclick="add('6')">6</button><button onclick="add('-')">-</button><br>
<button onclick="add('1')">1</button><button onclick="add('2')">2</button><button onclick="add('3')">3</button><button onclick="add('*')">*</button><br>
<button onclick="add('0')">0</button><button onclick="calc()">=</button><button onclick="clr()">C</button><button onclick="add('/')">/</button>
</div>

<!-- GAME -->
<div id="game" class="window">
<button onclick="closeWin('game')">X</button>
<button onclick="resetGame()">Reset</button><br>
<div id="grid"></div>
</div>

<!-- PAINT -->
<div id="paintApp" class="window">
<button onclick="closeWin('paintApp')">X</button><br>
<canvas id="canvas" width="220" height="150"></canvas><br>
<input type="color" id="colorPicker">
<button onclick="clearCanvas()">Clear</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="window">
<button onclick="closeWin('settings')">X</button><br>
<p>Wallpapers:</p>
<button onclick="bg1()">Dark</button>
<button onclick="bg2()">Blue</button>
<button onclick="bg3()">Sunset</button>
</div>

<div class="taskbar">
<span>Albion OS</span>
<span id="clock"></span>
</div>

</div>

<script>

// BOOT
setTimeout(()=>{
boot.style.display="none";
desktop.style.display="block";
},2000);

// CLOCK
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString();
},1000);

// WINDOWS
function openWin(id){document.getElementById(id).style.display="block";}
function closeWin(id){document.getElementById(id).style.display="none";}

// DRAG
let drag=null,ox=0,oy=0;
document.querySelectorAll(".window").forEach(w=>{
w.onmousedown=e=>{drag=w;ox=e.offsetX;oy=e.offsetY;}
w.ontouchstart=e=>{
drag=w;
ox=e.touches[0].clientX-w.offsetLeft;
oy=e.touches[0].clientY-w.offsetTop;
}
});
document.onmousemove=e=>{
if(drag){drag.style.left=e.pageX-ox+"px";drag.style.top=e.pageY-oy+"px";}
};
document.ontouchmove=e=>{
if(drag){drag.style.left=e.touches[0].clientX-ox+"px";drag.style.top=e.touches[0].clientY-oy+"px";}
};
document.onmouseup=()=>drag=null;
document.ontouchend=()=>drag=null;

// NOTEPAD
noteText.value=localStorage.getItem("note")||"";
function saveNote(){localStorage.setItem("note",noteText.value);}

// CALC
function add(v){display.value+=v;}
function clr(){display.value="";}
function calc(){try{display.value=eval(display.value);}catch{display.value="ERR";}}

// TIC TAC TOE
let board=["","","","","","","","",""],turn="X";
function draw(){
grid.innerHTML="";
board.forEach((c,i)=>{
let d=document.createElement("div");
d.className="cell";
d.innerText=c;
d.onclick=()=>move(i);
grid.appendChild(d);
});
}
function move(i){
if(board[i]!="")return;
board[i]=turn;
turn=turn=="X"?"O":"X";
draw();
}
function resetGame(){board=["","","","","","","","",""];turn="X";draw();}
draw();

// PAINT
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let drawing=false;

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;
canvas.onmousemove=e=>{
if(!drawing)return;
ctx.fillStyle=colorPicker.value;
ctx.fillRect(e.offsetX,e.offsetY,4,4);
};

canvas.ontouchstart=()=>drawing=true;
canvas.ontouchend=()=>drawing=false;
canvas.ontouchmove=e=>{
let rect=canvas.getBoundingClientRect();
let x=e.touches[0].clientX-rect.left;
let y=e.touches[0].clientY-rect.top;
ctx.fillStyle=colorPicker.value;
ctx.fillRect(x,y,4,4);
};

function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height);}

// WALLPAPERS
function bg1(){desktop.style.background="linear-gradient(135deg,#0f172a,#1e293b)";}
function bg2(){desktop.style.background="linear-gradient(135deg,#1e3a8a,#38bdf8)";}
function bg3(){desktop.style.background="linear-gradient(135deg,#f97316,#ef4444)";}

</script>

</body>
</html>
